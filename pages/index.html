{% extends "theme.html" %}

{% block content %}
<div class="container-fluid px-lg-5 mt-3">
    
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex align-items-center gap-2 overflow-x-auto pb-2 no-scrollbar">
                <a href="{% url 'home' %}" class="btn btn-primary rounded-pill px-4 flex-shrink-0">
                    <i class="bi bi-grid-fill me-2"></i> All Products
                </a>
                
                {% for j in categories %}  
                <a href="/?category={{j.id}}" class="btn btn-white bg-white shadow-sm border rounded-pill px-4 flex-shrink-0 transition-hover">
                    {{j.name}}
                </a>
                {% endfor %}
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold h4 mb-0">Discover Latest Gadgets</h2>
                <span class="text-muted small bg-white px-3 py-1 rounded-pill shadow-sm border">
                    {{ products|length }} Items found
                </span>
            </div>

            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 gy-4"> 
                {% for i in products %} 
                <div class="col">
                    <div class="card h-100 border-0 shadow-sm transition-hover overflow-hidden">
                        
                        <a href="{% url 'product_detail' i.id %}" class="text-decoration-none">
                            <div class="position-relative bg-white p-4" style="height: 220px;">
                                <img src="{{i.image.url}}" class="img-fluid w-100 h-100" alt="{{i.name}}" style="object-fit: contain;">
                                <!-- <span class="position-absolute top-0 start-0 m-3 badge rounded-pill bg-success">New</span> -->
                            </div>
                        </a>
                        
                        <div class="card-body px-3 pt-3">
                            <a href="{% url 'product_detail' i.id %}" class="text-decoration-none text-dark">
                                <h6 class="card-title fw-bold mb-1 text-truncate">{{i.name}}</h6>
                            </a>
                            <p class="text-primary fw-bold mb-0">Rs: {{i.price}}/-</p>
                        </div>

                        <div class="card-footer bg-white border-0 px-3 pb-3 pt-2">
                            <div class="d-flex gap-2">
                                <a href="{% url 'product_detail' i.id %}" class="btn btn-outline-secondary btn-sm flex-grow-1 rounded-pill fw-bold">
                                    <i class="bi bi-info-circle"></i> Info
                                </a>
                                <button type="button" value="{{ i.id }}" class="btn btn-primary btn-sm flex-grow-1 rounded-pill fw-bold add-cart-btn">
                                    <i class="bi bi-cart-plus me-1"></i> Add to Cart
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
    $(document).on('click', '.add-cart-btn', function (e) {
        e.preventDefault();
        var product_id = $(this).val();

        $.ajax({
            type: 'POST',
            url: '{% url "cart_add" %}', 
            data: {
                product_id: product_id,
                csrfmiddlewaretoken: '{{ csrf_token }}',
                action: 'post'
            },
            success: function (json) {
                var badge = document.getElementById("cart-qty");
                if (badge) {
                    badge.textContent = json.qty;
                }
            },
            error: function (xhr, errmsg, err) {
                console.log("Error logic:", err);
            }
        });
    });
</script>

<style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .transition-hover {
        transition: all 0.3s cubic-bezier(.25,.8,.25,1);
    }
    
    .transition-hover:hover {
        transform: translateY(-8px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.12) !important;
    }

    .btn-white:hover {
        border-color: var(--brand-color) !important;
        color: var(--brand-color);
    }

    .card { border-radius: 20px; }
</style>
{% endblock %}
